name: Agent macOS signed release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Numeric macOS package version, for example 0.2.0"
        required: true
      arch_mode:
        description: "macOS package architecture mode"
        required: true
        default: "universal"
        type: choice
        options:
          - universal
          - arm64
          - amd64
  push:
    tags:
      - "agent-macos-v*"

jobs:
  signed-macos-pkg:
    runs-on: macos-15
    env:
      MACOS_DEVELOPER_ID_APPLICATION: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION }}
      MACOS_DEVELOPER_ID_INSTALLER: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER }}
      MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
      MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
      MACOS_DEVELOPER_ID_INSTALLER_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_P12_BASE64 }}
      MACOS_DEVELOPER_ID_INSTALLER_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_P12_PASSWORD }}
      MACOS_NOTARY_API_KEY_BASE64: ${{ secrets.MACOS_NOTARY_API_KEY_BASE64 }}
      MACOS_NOTARY_API_KEY_ID: ${{ secrets.MACOS_NOTARY_API_KEY_ID }}
      MACOS_NOTARY_API_ISSUER_ID: ${{ secrets.MACOS_NOTARY_API_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Verify signing secrets are configured
        run: |
          set -euo pipefail
          [ -n "$MACOS_DEVELOPER_ID_APPLICATION" ] || { echo "MACOS_DEVELOPER_ID_APPLICATION is required"; exit 1; }
          [ -n "$MACOS_DEVELOPER_ID_INSTALLER" ] || { echo "MACOS_DEVELOPER_ID_INSTALLER is required"; exit 1; }
          [ -n "$MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64" ] || { echo "MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64 is required"; exit 1; }
          [ -n "$MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD" ] || { echo "MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD is required"; exit 1; }
          [ -n "$MACOS_DEVELOPER_ID_INSTALLER_P12_BASE64" ] || { echo "MACOS_DEVELOPER_ID_INSTALLER_P12_BASE64 is required"; exit 1; }
          [ -n "$MACOS_DEVELOPER_ID_INSTALLER_P12_PASSWORD" ] || { echo "MACOS_DEVELOPER_ID_INSTALLER_P12_PASSWORD is required"; exit 1; }
          [ -n "$MACOS_NOTARY_API_KEY_BASE64" ] || { echo "MACOS_NOTARY_API_KEY_BASE64 is required"; exit 1; }
          [ -n "$MACOS_NOTARY_API_KEY_ID" ] || { echo "MACOS_NOTARY_API_KEY_ID is required"; exit 1; }
          [ -n "$MACOS_NOTARY_API_ISSUER_ID" ] || { echo "MACOS_NOTARY_API_ISSUER_ID is required"; exit 1; }
      - name: Resolve release inputs
        id: release
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            arch_mode="${{ inputs.arch_mode }}"
          else
            version="${GITHUB_REF_NAME#agent-macos-v}"
            arch_mode="universal"
          fi
          python3 - <<'PY' "$version"
          import re, sys
          version = sys.argv[1]
          if not re.fullmatch(r"\d+(?:\.\d+){0,2}", version):
              raise SystemExit("signed macOS release version must be numeric with up to three dot-separated components")
          PY
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'arch_mode=%s\n' "$arch_mode" >> "$GITHUB_OUTPUT"
      - name: Syntax checks
        run: |
          python3 -m py_compile scripts/release/stage_agent_macos_install.py scripts/release/validate_agent_macos_install.py
          bash -n scripts/release/build_agent_macos_pkg.sh scripts/release/sign_notarize_agent_macos.sh scripts/release/uninstall_agent_macos.sh packaging/agent/macos/scripts/preinstall packaging/agent/macos/scripts/postinstall
      - name: Import temporary signing keychain
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/openassetwatch-signing.keychain-db"
          APP_CERT="$RUNNER_TEMP/openassetwatch-developer-id-application.p12"
          INSTALLER_CERT="$RUNNER_TEMP/openassetwatch-developer-id-installer.p12"
          NOTARY_KEY="$RUNNER_TEMP/AuthKey_${MACOS_NOTARY_API_KEY_ID}.p8"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          {
            printf 'OAW_MACOS_KEYCHAIN_PATH=%s\n' "$KEYCHAIN_PATH"
            printf 'OAW_MACOS_APP_CERT_PATH=%s\n' "$APP_CERT"
            printf 'OAW_MACOS_INSTALLER_CERT_PATH=%s\n' "$INSTALLER_CERT"
            printf 'OAW_MACOS_NOTARY_KEY_PATH=%s\n' "$NOTARY_KEY"
          } >> "$GITHUB_ENV"
          python3 - "$APP_CERT" "$INSTALLER_CERT" "$NOTARY_KEY" <<'PY'
          import base64
          import os
          import sys

          app_cert, installer_cert, notary_key = sys.argv[1:]
          for env_name, path in (
              ("MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64", app_cert),
              ("MACOS_DEVELOPER_ID_INSTALLER_P12_BASE64", installer_cert),
              ("MACOS_NOTARY_API_KEY_BASE64", notary_key),
          ):
              encoded = "".join(os.environ[env_name].split())
              with open(path, "wb") as handle:
                  handle.write(base64.b64decode(encoded, validate=True))
          PY
          chmod 0600 "$APP_CERT" "$INSTALLER_CERT" "$NOTARY_KEY"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$APP_CERT" -k "$KEYCHAIN_PATH" -P "$MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security >/dev/null
          security import "$INSTALLER_CERT" -k "$KEYCHAIN_PATH" -P "$MACOS_DEVELOPER_ID_INSTALLER_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$MACOS_DEVELOPER_ID_APPLICATION" >/dev/null
          security find-certificate -c "$MACOS_DEVELOPER_ID_INSTALLER" "$KEYCHAIN_PATH" >/dev/null
      - name: Build signed, notarized, stapled PKG
        run: |
          bash scripts/release/sign_notarize_agent_macos.sh \
            --version "${{ steps.release.outputs.version }}" \
            --arch-mode "${{ steps.release.outputs.arch_mode }}" \
            --app-identity "$MACOS_DEVELOPER_ID_APPLICATION" \
            --installer-identity "$MACOS_DEVELOPER_ID_INSTALLER" \
            --api-key "$OAW_MACOS_NOTARY_KEY_PATH" \
            --api-key-id "$MACOS_NOTARY_API_KEY_ID" \
            --api-issuer "$MACOS_NOTARY_API_ISSUER_ID"
      - name: Validate signed package payload
        run: |
          PKG="dist/agent/${{ steps.release.outputs.version }}/packages/OpenAssetWatchAgent-${{ steps.release.outputs.version }}-macos-${{ steps.release.outputs.arch_mode }}.pkg"
          python3 scripts/release/validate_agent_macos_install.py \
            --version "${{ steps.release.outputs.version }}" \
            --macos-install-root "dist/agent/${{ steps.release.outputs.version }}/macos-install" \
            --pkg "$PKG" \
            --require-signed-binary
      - uses: actions/upload-artifact@v7
        with:
          name: openassetwatch-agent-macos-signed
          path: |
            dist/agent/${{ steps.release.outputs.version }}/packages/*.pkg
            dist/agent/${{ steps.release.outputs.version }}/packages/*.sha256
            dist/agent/${{ steps.release.outputs.version }}/packages/*.json
      - name: Remove temporary signing material
        if: always()
        run: |
          set +e
          if [ -n "${OAW_MACOS_KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$OAW_MACOS_KEYCHAIN_PATH" >/dev/null 2>&1
          fi
          rm -f \
            "${OAW_MACOS_APP_CERT_PATH:-}" \
            "${OAW_MACOS_INSTALLER_CERT_PATH:-}" \
            "${OAW_MACOS_NOTARY_KEY_PATH:-}"
