name: Agent CI

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - ".github/workflows/agent-ci.yml"
      - "cmd/oaw-agent/**"
      - "internal/agent/**"
      - "pkg/**"
      - "scripts/release/**"
      - "packaging/agent/**"
      - "go.mod"
      - "go.sum"

jobs:
  ubuntu-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          files="$(git ls-files '*.go')"
          changed="$(gofmt -l $files)"
          if [ -n "$changed" ]; then
            echo "$changed"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: race tests
        run: go test -race ./cmd/oaw-agent ./internal/agent/supervisor
      - name: Windows cross-build
        shell: pwsh
        run: ./scripts/release/build_agent_dist.ps1 -Version 0.1.0-ci -TargetOS windows -TargetArch amd64
      - name: Release script syntax
        shell: pwsh
        run: |
          $scripts = @(
            "scripts/release/build_agent_dist.ps1",
            "scripts/release/build_agent_msi.ps1",
            "scripts/release/install_agent_windows_files.ps1",
            "scripts/release/uninstall_agent_windows_files.ps1",
            "scripts/release/install_agent_windows_service.ps1",
            "scripts/release/uninstall_agent_windows_service.ps1",
            "scripts/release/sign_agent_windows.ps1"
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            $resolved = (Resolve-Path $script).Path
            $null = [System.Management.Automation.Language.Parser]::ParseFile($resolved, [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) {
              Write-Error "PowerShell parser errors in $script"
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }
          $pythonScripts = git ls-files "scripts/release/*.py"
          python3 -m py_compile @pythonScripts
          python3 scripts/release/test_linux_packaging.py
          $bashScripts = @(
            "scripts/release/build_agent_macos_pkg.sh",
            "scripts/release/sign_notarize_agent_macos.sh",
            "scripts/release/uninstall_agent_macos.sh",
            "packaging/agent/linux/common/libexec/oaw-ip-neigh-show",
            "packaging/agent/linux/common/libexec/oaw-ip-addr-show",
            "packaging/agent/linux/deb/postinst",
            "packaging/agent/linux/deb/prerm",
            "packaging/agent/linux/deb/postrm",
            "packaging/agent/macos/scripts/preinstall",
            "packaging/agent/macos/scripts/postinstall"
          )
          bash -n @bashScripts

  linux-deb-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install package inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sudo systemd
      - name: Build Linux amd64 artifact
        shell: pwsh
        run: ./scripts/release/build_agent_dist.ps1 -Version 0.1.0-linuxpkg-ci -TargetOS linux -TargetArch amd64
      - name: Build and validate DEB
        run: |
          python3 ./scripts/release/package_agent_deb.py --version 0.1.0-linuxpkg-ci
          python3 ./scripts/release/validate_agent_deb.py --version 0.1.0-linuxpkg-ci
      - name: Inspect DEB payload and metadata
        run: |
          set -euo pipefail
          DEB="dist/agent/0.1.0-linuxpkg-ci/packages/openassetwatch-agent_0.1.0-linuxpkg-ci_amd64.deb"
          EXTRACT="$RUNNER_TEMP/oaw-deb-extract"
          dpkg-deb --info "$DEB"
          dpkg-deb --contents "$DEB" | tee "$RUNNER_TEMP/oaw-deb-contents.txt"
          dpkg-deb -x "$DEB" "$EXTRACT"
          test -x "$EXTRACT/opt/openassetwatch/agent/bin/oaw-agent"
          test -f "$EXTRACT/lib/systemd/system/oaw-agent.service"
          test -f "$EXTRACT/lib/systemd/system/oaw-agent.timer"
          systemd-analyze --root="$EXTRACT" verify oaw-agent.service oaw-agent.timer
          sudo visudo -cf "$EXTRACT/etc/sudoers.d/openassetwatch-agent"
      - uses: actions/upload-artifact@v4
        with:
          name: openassetwatch-agent-linux-deb-unsigned
          path: |
            dist/agent/0.1.0-linuxpkg-ci/packages/*.deb
            dist/agent/0.1.0-linuxpkg-ci/packages/*.sha256
            dist/agent/0.1.0-linuxpkg-ci/packages/*.json

  linux-rpm-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install RPM inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm sudo systemd
      - name: Build Linux amd64 artifact
        shell: pwsh
        run: ./scripts/release/build_agent_dist.ps1 -Version 0.1.0-rpmpkg-ci -TargetOS linux -TargetArch amd64
      - name: Build and validate RPM
        run: |
          python3 ./scripts/release/package_agent_rpm.py --version 0.1.0-rpmpkg-ci
          python3 ./scripts/release/validate_agent_rpm.py --version 0.1.0-rpmpkg-ci
      - name: Inspect RPM payload and metadata
        run: |
          set -euo pipefail
          RPM="dist/agent/0.1.0-rpmpkg-ci/packages/openassetwatch-agent-0.1.0_rpmpkg_ci-1.x86_64.rpm"
          ROOT="dist/agent/0.1.0-rpmpkg-ci/rpm/BUILDROOT/openassetwatch-agent-0.1.0-rpmpkg-ci-1.x86_64"
          rpm -qip "$RPM"
          rpm -qpl "$RPM" | tee "$RUNNER_TEMP/oaw-rpm-payload.txt"
          rpm -qp --scripts "$RPM"
          rpm -qp --dump "$RPM"
          test -x "$ROOT/opt/openassetwatch/agent/bin/oaw-agent"
          test -f "$ROOT/usr/lib/systemd/system/oaw-agent.service"
          test -f "$ROOT/usr/lib/systemd/system/oaw-agent.timer"
          systemd-analyze --root="$ROOT" verify oaw-agent.service oaw-agent.timer
          sudo visudo -cf "$ROOT/etc/sudoers.d/openassetwatch-agent"
      - uses: actions/upload-artifact@v4
        with:
          name: openassetwatch-agent-linux-rpm-unsigned
          path: |
            dist/agent/0.1.0-rpmpkg-ci/packages/*.rpm
            dist/agent/0.1.0-rpmpkg-ci/packages/*.sha256
            dist/agent/0.1.0-rpmpkg-ci/packages/*.json

  linux-deb-lifecycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Debian lifecycle tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sudo systemd
      - name: Build old and new DEB fixtures
        shell: pwsh
        run: |
          ./scripts/release/build_agent_dist.ps1 -Version 0.1.90 -TargetOS linux -TargetArch amd64
          ./scripts/release/build_agent_dist.ps1 -Version 0.1.91 -TargetOS linux -TargetArch amd64
      - name: Package old and new DEB fixtures
        run: |
          python3 ./scripts/release/package_agent_deb.py --version 0.1.90
          python3 ./scripts/release/package_agent_deb.py --version 0.1.91
          python3 ./scripts/release/validate_agent_deb.py --version 0.1.90
          python3 ./scripts/release/validate_agent_deb.py --version 0.1.91
      - name: Install, repair, upgrade, downgrade, and uninstall DEB through systemd timer
        run: |
          set -euo pipefail
          OLD_DEB="dist/agent/0.1.90/packages/openassetwatch-agent_0.1.90_amd64.deb"
          NEW_DEB="dist/agent/0.1.91/packages/openassetwatch-agent_0.1.91_amd64.deb"
          MOCK="$RUNNER_TEMP/oaw_mock_backend.py"
          export OAW_MOCK_LOG="$RUNNER_TEMP/oaw_mock_backend.jsonl"
          cat > "$MOCK" <<'PY'
          import json
          import os
          from http.server import BaseHTTPRequestHandler, HTTPServer
          from pathlib import Path
          log = Path(os.environ["OAW_MOCK_LOG"])
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.end_headers()
              def do_POST(self):
                  body = self.rfile.read(int(self.headers.get("content-length", "0")))
                  with log.open("a", encoding="utf-8") as handle:
                      handle.write(json.dumps({"path": self.path, "body_len": len(body)}) + "\n")
                  self.send_response(202)
                  self.end_headers()
              def log_message(self, fmt, *args):
                  return
          HTTPServer(("127.0.0.1", 18080), Handler).serve_forever()
          PY
          python3 "$MOCK" &
          BACKEND_PID=$!
          cleanup() {
            kill "$BACKEND_PID" 2>/dev/null || true
            sudo dpkg -r openassetwatch-agent >/dev/null 2>&1 || true
            sudo systemctl daemon-reload >/dev/null 2>&1 || true
            sudo rm -rf /opt/openassetwatch /usr/lib/openassetwatch /etc/sudoers.d/openassetwatch-agent
            sudo rm -f /usr/bin/oaw-agent /lib/systemd/system/oaw-agent.service /lib/systemd/system/oaw-agent.timer
            sudo rm -rf /etc/systemd/system/oaw-agent.timer.d
            sudo rm -f /etc/systemd/system/timers.target.wants/oaw-agent.timer
            sudo rm -rf /etc/openassetwatch /var/lib/openassetwatch /var/log/openassetwatch
            sudo userdel openassetwatch >/dev/null 2>&1 || true
            sudo groupdel openassetwatch >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          wait_for_log() {
            pattern="$1"
            for _ in $(seq 1 90); do
              if [ -f "$OAW_MOCK_LOG" ] && grep -q "$pattern" "$OAW_MOCK_LOG"; then
                return 0
              fi
              sleep 1
            done
            sudo systemctl status oaw-agent.timer --no-pager || true
            sudo systemctl status oaw-agent.service --no-pager || true
            sudo journalctl -u oaw-agent.service --no-pager -n 200 || true
            return 1
          }

          install_ci_timer_override() {
            sudo mkdir -p /etc/systemd/system/oaw-agent.timer.d
            sudo tee /etc/systemd/system/oaw-agent.timer.d/ci.conf >/dev/null <<'EOF'
          [Timer]
          OnBootSec=
          OnUnitActiveSec=
          RandomizedDelaySec=
          AccuracySec=
          OnBootSec=1s
          OnUnitActiveSec=5s
          RandomizedDelaySec=0
          AccuracySec=1s
          EOF
            sudo systemctl daemon-reload
          }

          assert_timer_triggered_service() {
            wait_for_log "/api/v1/agents/check-in"
            wait_for_log "/api/v1/collections/local-inventory"
            test -f /var/lib/openassetwatch/agent/last-inventory.json
            test "$(systemctl show oaw-agent.service -p Result --value)" = "success"
            sudo systemctl is-active --quiet oaw-agent.timer
          }

          sudo dpkg -i "$OLD_DEB"
          test -x /opt/openassetwatch/agent/bin/oaw-agent
          id openassetwatch
          getent group openassetwatch
          test "$(id -gn openassetwatch)" = "openassetwatch"
          case "$(getent passwd openassetwatch | awk -F: '{print $7}')" in
            /usr/sbin/nologin|/sbin/nologin|/bin/false) ;;
            *) exit 1 ;;
          esac
          test -f /lib/systemd/system/oaw-agent.service
          test -f /lib/systemd/system/oaw-agent.timer
          sudo systemctl is-enabled --quiet oaw-agent.timer
          sudo systemctl status oaw-agent.timer --no-pager || true
          sudo systemctl status oaw-agent.service --no-pager || true

          sudo install -d -m 0750 -o root -g openassetwatch /etc/openassetwatch/agent
          printf '%s\n' '{"server_url":"http://127.0.0.1:18080","site_id":"ci-linux"}' | sudo tee /etc/openassetwatch/agent/config.json >/dev/null
          printf '%s\n' '{"site_id":"ci-linux","agent_id":"11111111-1111-4111-8111-111111111111","deployment_id":"22222222-2222-4222-8222-222222222222","tenant_id":"ci","created_at":"2026-01-01T00:00:00Z","updated_at":"2026-01-01T00:00:00Z"}' | sudo tee /etc/openassetwatch/agent/identity.json >/dev/null
          sudo chown root:openassetwatch /etc/openassetwatch/agent/config.json /etc/openassetwatch/agent/identity.json
          sudo chmod 0640 /etc/openassetwatch/agent/config.json /etc/openassetwatch/agent/identity.json
          CONFIG_HASH="$(sudo sha256sum /etc/openassetwatch/agent/config.json | awk '{print $1}')"
          IDENTITY_HASH="$(sudo sha256sum /etc/openassetwatch/agent/identity.json | awk '{print $1}')"
          sudo install -o openassetwatch -g openassetwatch -m 0640 /dev/null /var/lib/openassetwatch/agent/state-survival.txt
          sudo install -o openassetwatch -g openassetwatch -m 0640 /dev/null /var/log/openassetwatch/agent/log-survival.txt
          install_ci_timer_override

          sudo systemctl restart oaw-agent.timer
          assert_timer_triggered_service

          sudo dpkg -i "$OLD_DEB"
          test "$CONFIG_HASH" = "$(sudo sha256sum /etc/openassetwatch/agent/config.json | awk '{print $1}')"
          test "$IDENTITY_HASH" = "$(sudo sha256sum /etc/openassetwatch/agent/identity.json | awk '{print $1}')"
          test -f /var/lib/openassetwatch/agent/state-survival.txt
          test -f /var/log/openassetwatch/agent/log-survival.txt
          sudo systemctl is-enabled --quiet oaw-agent.timer

          sudo dpkg -i "$NEW_DEB"
          test "$CONFIG_HASH" = "$(sudo sha256sum /etc/openassetwatch/agent/config.json | awk '{print $1}')"
          test "$IDENTITY_HASH" = "$(sudo sha256sum /etc/openassetwatch/agent/identity.json | awk '{print $1}')"
          test -f /var/lib/openassetwatch/agent/state-survival.txt
          test -f /var/log/openassetwatch/agent/log-survival.txt
          sudo systemctl is-enabled --quiet oaw-agent.timer

          sudo dpkg -i --force-downgrade "$OLD_DEB"
          test "$CONFIG_HASH" = "$(sudo sha256sum /etc/openassetwatch/agent/config.json | awk '{print $1}')"
          test "$IDENTITY_HASH" = "$(sudo sha256sum /etc/openassetwatch/agent/identity.json | awk '{print $1}')"
          test -f /var/lib/openassetwatch/agent/state-survival.txt
          test -f /var/log/openassetwatch/agent/log-survival.txt

          sudo dpkg -r openassetwatch-agent
          test ! -e /opt/openassetwatch/agent/bin/oaw-agent
          test ! -e /lib/systemd/system/oaw-agent.service
          test ! -e /lib/systemd/system/oaw-agent.timer
          test ! -e /etc/systemd/system/timers.target.wants/oaw-agent.timer
          ! sudo systemctl is-enabled --quiet oaw-agent.timer
          ! sudo systemctl is-active --quiet oaw-agent.timer
          test -f /etc/openassetwatch/agent/config.json
          test -f /etc/openassetwatch/agent/identity.json
          test -f /var/lib/openassetwatch/agent/state-survival.txt
          test -f /var/log/openassetwatch/agent/log-survival.txt

  linux-rpm-lifecycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install RPM build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
      - name: Build old and new RPM fixtures
        shell: pwsh
        run: |
          ./scripts/release/build_agent_dist.ps1 -Version 0.1.90 -TargetOS linux -TargetArch amd64
          ./scripts/release/build_agent_dist.ps1 -Version 0.1.91 -TargetOS linux -TargetArch amd64
      - name: Package old and new RPM fixtures
        run: |
          python3 ./scripts/release/package_agent_rpm.py --version 0.1.90
          python3 ./scripts/release/package_agent_rpm.py --version 0.1.91
          python3 ./scripts/release/validate_agent_rpm.py --version 0.1.90
          python3 ./scripts/release/validate_agent_rpm.py --version 0.1.91
      - name: Install, repair, upgrade, downgrade, and uninstall RPM in Rocky Linux systemd
        run: |
          set -euo pipefail
          MOCK="$RUNNER_TEMP/oaw_mock_backend.py"
          cat > "$MOCK" <<'PY'
          import json
          import os
          from http.server import BaseHTTPRequestHandler, HTTPServer
          from pathlib import Path
          log = Path(os.environ["OAW_MOCK_LOG"])
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.end_headers()
              def do_POST(self):
                  body = self.rfile.read(int(self.headers.get("content-length", "0")))
                  with log.open("a", encoding="utf-8") as handle:
                      handle.write(json.dumps({"path": self.path, "body_len": len(body)}) + "\n")
                  self.send_response(202)
                  self.end_headers()
              def log_message(self, fmt, *args):
                  return
          HTTPServer(("127.0.0.1", 18080), Handler).serve_forever()
          PY
          CONTAINER="oaw-rocky-systemd-${{ github.run_id }}-${{ github.run_attempt }}"
          cleanup() {
            docker rm -f "$CONTAINER" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker run --detach --privileged --name "$CONTAINER" \
            --tmpfs /run \
            --tmpfs /run/lock \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            -v "$PWD:/work" \
            -v "$RUNNER_TEMP:/tmp/oaw-runner-temp" \
            -w /work \
            rockylinux:9 \
            /usr/sbin/init
          for _ in $(seq 1 60); do
            if docker exec "$CONTAINER" systemctl is-system-running >/tmp/oaw-rocky-systemd-state.txt 2>&1; then
              break
            fi
            if grep -Eq "running|degraded" /tmp/oaw-rocky-systemd-state.txt; then
              break
            fi
            sleep 1
          done
          docker exec "$CONTAINER" /bin/bash -lc "dnf -y install python3 sudo systemd shadow-utils iproute"
          docker exec "$CONTAINER" /bin/bash -lc '
              set -euo pipefail
              OLD_RPM="dist/agent/0.1.90/packages/openassetwatch-agent-0.1.90-1.x86_64.rpm"
              NEW_RPM="dist/agent/0.1.91/packages/openassetwatch-agent-0.1.91-1.x86_64.rpm"
              MOCK="/tmp/oaw-runner-temp/oaw_mock_backend.py"
              export OAW_MOCK_LOG="/tmp/oaw_mock_backend.jsonl"
              python3 "$MOCK" &
              BACKEND_PID=$!
              cleanup() {
                kill "$BACKEND_PID" 2>/dev/null || true
                rpm -e openassetwatch-agent >/dev/null 2>&1 || true
                systemctl daemon-reload >/dev/null 2>&1 || true
              }
              trap cleanup EXIT

              wait_for_log() {
                pattern="$1"
                for _ in $(seq 1 90); do
                  if [ -f "$OAW_MOCK_LOG" ] && grep -q "$pattern" "$OAW_MOCK_LOG"; then
                    return 0
                  fi
                  sleep 1
                done
                systemctl status oaw-agent.timer --no-pager || true
                systemctl status oaw-agent.service --no-pager || true
                journalctl -u oaw-agent.service --no-pager -n 200 || true
                return 1
              }

              install_ci_timer_override() {
                mkdir -p /etc/systemd/system/oaw-agent.timer.d
                cat > /etc/systemd/system/oaw-agent.timer.d/ci.conf <<'"'"'EOF'"'"'
          [Timer]
          OnBootSec=
          OnUnitActiveSec=
          RandomizedDelaySec=
          AccuracySec=
          OnBootSec=1s
          OnUnitActiveSec=5s
          RandomizedDelaySec=0
          AccuracySec=1s
          EOF
                systemctl daemon-reload
              }

              assert_timer_triggered_service() {
                wait_for_log "/api/v1/agents/check-in"
                wait_for_log "/api/v1/collections/local-inventory"
                test -f /var/lib/openassetwatch/agent/last-inventory.json
                test "$(systemctl show oaw-agent.service -p Result --value)" = "success"
                systemctl is-active --quiet oaw-agent.timer
              }

              rpm -Uvh "$OLD_RPM"
              test -x /opt/openassetwatch/agent/bin/oaw-agent
              id openassetwatch
              getent group openassetwatch
              test "$(id -gn openassetwatch)" = "openassetwatch"
              case "$(getent passwd openassetwatch | awk -F: '"'"'{print $7}'"'"')" in
                /usr/sbin/nologin|/sbin/nologin|/bin/false) ;;
                *) exit 1 ;;
              esac
              test -f /usr/lib/systemd/system/oaw-agent.service
              test -f /usr/lib/systemd/system/oaw-agent.timer
              systemctl is-enabled --quiet oaw-agent.timer

              install -d -m 0750 -o root -g openassetwatch /etc/openassetwatch/agent
              printf "%s\n" "{\"server_url\":\"http://127.0.0.1:18080\",\"site_id\":\"ci-linux\"}" > /etc/openassetwatch/agent/config.json
              printf "%s\n" "{\"site_id\":\"ci-linux\",\"agent_id\":\"11111111-1111-4111-8111-111111111111\",\"deployment_id\":\"22222222-2222-4222-8222-222222222222\",\"tenant_id\":\"ci\",\"created_at\":\"2026-01-01T00:00:00Z\",\"updated_at\":\"2026-01-01T00:00:00Z\"}" > /etc/openassetwatch/agent/identity.json
              chown root:openassetwatch /etc/openassetwatch/agent/config.json /etc/openassetwatch/agent/identity.json
              chmod 0640 /etc/openassetwatch/agent/config.json /etc/openassetwatch/agent/identity.json
              CONFIG_HASH="$(sha256sum /etc/openassetwatch/agent/config.json | awk '"'"'{print $1}'"'"')"
              IDENTITY_HASH="$(sha256sum /etc/openassetwatch/agent/identity.json | awk '"'"'{print $1}'"'"')"
              install -o openassetwatch -g openassetwatch -m 0640 /dev/null /var/lib/openassetwatch/agent/state-survival.txt
              install -o openassetwatch -g openassetwatch -m 0640 /dev/null /var/log/openassetwatch/agent/log-survival.txt
              install_ci_timer_override

              systemctl restart oaw-agent.timer
              assert_timer_triggered_service

              rpm -Uvh --replacepkgs "$OLD_RPM"
              test "$CONFIG_HASH" = "$(sha256sum /etc/openassetwatch/agent/config.json | awk '"'"'{print $1}'"'"')"
              test "$IDENTITY_HASH" = "$(sha256sum /etc/openassetwatch/agent/identity.json | awk '"'"'{print $1}'"'"')"
              test -f /var/lib/openassetwatch/agent/state-survival.txt
              test -f /var/log/openassetwatch/agent/log-survival.txt
              systemctl is-enabled --quiet oaw-agent.timer

              rpm -Uvh "$NEW_RPM"
              test "$CONFIG_HASH" = "$(sha256sum /etc/openassetwatch/agent/config.json | awk '"'"'{print $1}'"'"')"
              test "$IDENTITY_HASH" = "$(sha256sum /etc/openassetwatch/agent/identity.json | awk '"'"'{print $1}'"'"')"
              test -f /var/lib/openassetwatch/agent/state-survival.txt
              test -f /var/log/openassetwatch/agent/log-survival.txt
              systemctl is-enabled --quiet oaw-agent.timer

              rpm -Uvh --oldpackage "$OLD_RPM"
              test "$CONFIG_HASH" = "$(sha256sum /etc/openassetwatch/agent/config.json | awk '"'"'{print $1}'"'"')"
              test "$IDENTITY_HASH" = "$(sha256sum /etc/openassetwatch/agent/identity.json | awk '"'"'{print $1}'"'"')"
              test -f /var/lib/openassetwatch/agent/state-survival.txt
              test -f /var/log/openassetwatch/agent/log-survival.txt

              rpm -e openassetwatch-agent
              test ! -e /opt/openassetwatch/agent/bin/oaw-agent
              test ! -e /usr/lib/systemd/system/oaw-agent.service
              test ! -e /usr/lib/systemd/system/oaw-agent.timer
              test ! -e /etc/systemd/system/timers.target.wants/oaw-agent.timer
              ! systemctl is-enabled --quiet oaw-agent.timer
              ! systemctl is-active --quiet oaw-agent.timer
              test -f /etc/openassetwatch/agent/config.json
              test -f /etc/openassetwatch/agent/identity.json
              test -f /var/lib/openassetwatch/agent/state-survival.txt
              test -f /var/log/openassetwatch/agent/log-survival.txt
            '

  windows-agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: gofmt
        shell: pwsh
        run: |
          $files = git ls-files '*.go'
          foreach ($file in $files) {
            $content = [System.IO.File]::ReadAllText($file)
            $normalized = $content -replace "`r`n", "`n"
            if ($normalized -ne $content) {
              [System.IO.File]::WriteAllText($file, $normalized, [System.Text.UTF8Encoding]::new($false))
            }
          }
          $changed = gofmt -l $files
          if ($changed) {
            $changed
            exit 1
          }
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...

      - name: Build Windows artifact
        shell: pwsh
        run: ./scripts/release/build_agent_dist.ps1 -Version 0.1.0-ci -TargetOS windows -TargetArch amd64

      - name: Stage and validate Windows layout
        shell: pwsh
        run: |
          python ./scripts/release/stage_agent_windows_install.py --version 0.1.0-ci
          python ./scripts/release/validate_agent_windows_install.py --version 0.1.0-ci

      - name: Dry-run Windows helpers
        shell: pwsh
        run: |
          $root = "dist/agent/0.1.0-ci/windows-install"
          $metadata = "$root/service/oaw-agent-service.json"
          ./scripts/release/install_agent_windows_files.ps1 -WindowsInstallRoot $root -DryRun
          ./scripts/release/uninstall_agent_windows_files.ps1 -ServiceMetadata $metadata -DryRun
          ./scripts/release/install_agent_windows_service.ps1 -InstallRoot $root -ServiceMetadata $metadata -DryRun
          ./scripts/release/uninstall_agent_windows_service.ps1 -ServiceMetadata $metadata -DryRun

      - name: Build and validate MSI
        shell: pwsh
        run: |
          ./scripts/release/build_agent_msi.ps1 -Version 0.1.0-ci -TargetArch amd64
          python ./scripts/release/validate_agent_windows_msi.py --version 0.1.0-ci

      - name: Real SCM lifecycle smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $serviceName = "OpenAssetWatchAgent"
          $root = Resolve-Path "dist/agent/0.1.0-ci/windows-install"
          $metadata = Join-Path $root "service/oaw-agent-service.json"
          $mock = Join-Path $env:RUNNER_TEMP "oaw_mock_backend.py"
          @'
          import json
          from http.server import BaseHTTPRequestHandler, HTTPServer
          from pathlib import Path
          log = Path(__import__("os").environ["OAW_MOCK_LOG"])
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.end_headers()
              def do_POST(self):
                  body = self.rfile.read(int(self.headers.get("content-length", "0")))
                  with log.open("a", encoding="utf-8") as f:
                      f.write(json.dumps({"path": self.path, "body_len": len(body)}) + "\n")
                  self.send_response(202)
                  self.end_headers()
              def log_message(self, fmt, *args):
                  return
          HTTPServer(("127.0.0.1", 18080), Handler).serve_forever()
          '@ | Set-Content -Encoding utf8 $mock
          $env:OAW_MOCK_LOG = Join-Path $env:RUNNER_TEMP "oaw_mock_backend.jsonl"
          $backend = Start-Process python -ArgumentList $mock -PassThru
          try {
            ./scripts/release/install_agent_windows_files.ps1 -WindowsInstallRoot $root
            New-Item -ItemType Directory -Force -Path "C:\ProgramData\OpenAssetWatch\Agent\config","C:\ProgramData\OpenAssetWatch\Agent\identity" | Out-Null
            '{"server_url":"http://127.0.0.1:18080","site_id":"ci-site"}' | Set-Content -Encoding utf8 "C:\ProgramData\OpenAssetWatch\Agent\config\config.json"
            '{"site_id":"ci-site","agent_id":"11111111-1111-4111-8111-111111111111","deployment_id":"22222222-2222-4222-8222-222222222222","tenant_id":"ci","created_at":"2026-01-01T00:00:00Z","updated_at":"2026-01-01T00:00:00Z"}' | Set-Content -Encoding utf8 "C:\ProgramData\OpenAssetWatch\Agent\identity\identity.json"
            ./scripts/release/install_agent_windows_service.ps1 -InstallRoot $root -ServiceMetadata $metadata -Start
            $deadline = (Get-Date).AddSeconds(75)
            do {
              Start-Sleep -Seconds 2
              $svc = Get-Service -Name $serviceName -ErrorAction Stop
              $statusPath = "C:\ProgramData\OpenAssetWatch\Agent\state\status.json"
              $inventoryPath = "C:\ProgramData\OpenAssetWatch\Agent\state\last-inventory.json"
              $statusOk = Test-Path $statusPath
              $inventoryOk = Test-Path $inventoryPath
              $events = if (Test-Path $env:OAW_MOCK_LOG) { Get-Content $env:OAW_MOCK_LOG } else { @() }
              if ($svc.Status -eq "Running" -and $statusOk -and $inventoryOk -and ($events -match "/api/v1/agents/check-in") -and ($events -match "/api/v1/collections/local-inventory")) {
                break
              }
            } while ((Get-Date) -lt $deadline)
            if ($svc.Status -ne "Running") { throw "Service did not report Running." }
            if (-not (Test-Path $statusPath)) { throw "status.json was not written." }
            if (-not (Test-Path $inventoryPath)) { throw "last-inventory.json was not written." }
            $status = Get-Content -Raw $statusPath | ConvertFrom-Json
            if ($status.health -ne "healthy") { throw "status.json did not report healthy: $($status | ConvertTo-Json -Compress)" }
            Stop-Service -Name $serviceName -ErrorAction Stop
            (Get-Service -Name $serviceName -ErrorAction Stop).WaitForStatus("Stopped", "00:00:30")
            Start-Service -Name $serviceName -ErrorAction Stop
            (Get-Service -Name $serviceName -ErrorAction Stop).WaitForStatus("Running", "00:00:30")
          }
          finally {
            ./scripts/release/uninstall_agent_windows_service.ps1 -ServiceName $serviceName -Stop -DryRun:$false -ErrorAction SilentlyContinue | Out-Host
            ./scripts/release/uninstall_agent_windows_files.ps1 -ProgramFilesAgentRoot "C:\Program Files\OpenAssetWatch\Agent" -ProgramDataAgentRoot "C:\ProgramData\OpenAssetWatch\Agent" -RemoveState -RemoveLogs -ErrorAction SilentlyContinue | Out-Host
            Remove-Item -LiteralPath "C:\Program Files\OpenAssetWatch\Agent" -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath "C:\ProgramData\OpenAssetWatch\Agent" -Recurse -Force -ErrorAction SilentlyContinue
            Stop-Process -Id $backend.Id -Force -ErrorAction SilentlyContinue
          }
          if (Get-Service -Name $serviceName -ErrorAction SilentlyContinue) {
            throw "Service was not removed."
          }

      - name: MSI lifecycle smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $msi = Resolve-Path "dist/agent/0.1.0-ci/packages/OpenAssetWatchAgent-0.1.0-ci-windows-amd64.msi"
          ./scripts/release/build_agent_dist.ps1 -Version 0.1.1-ci -TargetOS windows -TargetArch amd64
          ./scripts/release/build_agent_msi.ps1 -Version 0.1.1-ci -TargetArch amd64
          $msiUpgrade = Resolve-Path "dist/agent/0.1.1-ci/packages/OpenAssetWatchAgent-0.1.1-ci-windows-amd64.msi"
          $log = Join-Path $env:RUNNER_TEMP "oaw-msi-install.log"
          $configPath = "C:\ProgramData\OpenAssetWatch\Agent\config\config.json"
          $identityPath = "C:\ProgramData\OpenAssetWatch\Agent\identity\identity.json"
          try {
            New-Item -ItemType Directory -Force -Path "C:\ProgramData\OpenAssetWatch\Agent\config","C:\ProgramData\OpenAssetWatch\Agent\identity" | Out-Null
            '{"server_url":"http://127.0.0.1:18080","site_id":"ci-msi-site"}' | Set-Content -Encoding utf8 $configPath
            '{"site_id":"ci-msi-site","agent_id":"33333333-3333-4333-8333-333333333333","deployment_id":"44444444-4444-4444-8444-444444444444","tenant_id":"ci","created_at":"2026-01-01T00:00:00Z","updated_at":"2026-01-01T00:00:00Z"}' | Set-Content -Encoding utf8 $identityPath
            $proc = Start-Process msiexec.exe -ArgumentList @("/i", $msi, "/qn", "/norestart", "/l*v", $log) -Wait -PassThru
            if ($proc.ExitCode -ne 0) { throw "MSI install failed with $($proc.ExitCode)." }
            if (-not (Get-Service -Name OpenAssetWatchAgent -ErrorAction SilentlyContinue)) { throw "MSI did not create service." }
            $repair = Start-Process msiexec.exe -ArgumentList @("/fa", $msi, "/qn", "/norestart") -Wait -PassThru
            if ($repair.ExitCode -ne 0) { throw "MSI repair failed with $($repair.ExitCode)." }
            if (-not (Select-String -LiteralPath $configPath -Pattern "ci-msi-site" -Quiet)) { throw "MSI repair did not preserve config." }
            if (-not (Select-String -LiteralPath $identityPath -Pattern "33333333-3333-4333-8333-333333333333" -Quiet)) { throw "MSI repair did not preserve identity." }
            $upgrade = Start-Process msiexec.exe -ArgumentList @("/i", $msiUpgrade, "/qn", "/norestart") -Wait -PassThru
            if ($upgrade.ExitCode -ne 0) { throw "MSI major upgrade failed with $($upgrade.ExitCode)." }
            if (-not (Get-Service -Name OpenAssetWatchAgent -ErrorAction SilentlyContinue)) { throw "MSI major upgrade removed service." }
            if (-not (Select-String -LiteralPath $configPath -Pattern "ci-msi-site" -Quiet)) { throw "MSI major upgrade did not preserve config." }
            if (-not (Select-String -LiteralPath $identityPath -Pattern "33333333-3333-4333-8333-333333333333" -Quiet)) { throw "MSI major upgrade did not preserve identity." }
          }
          finally {
            $uninstall = Start-Process msiexec.exe -ArgumentList @("/x", $msiUpgrade, "/qn", "/norestart") -Wait -PassThru
            if ($uninstall.ExitCode -ne 0) { throw "MSI uninstall failed with $($uninstall.ExitCode)." }
          }
          if (Get-Service -Name OpenAssetWatchAgent -ErrorAction SilentlyContinue) {
            throw "MSI uninstall left an orphan service."
          }
          if (-not (Test-Path $configPath)) { throw "MSI uninstall did not preserve config." }
          if (-not (Test-Path $identityPath)) { throw "MSI uninstall did not preserve identity." }

  macos-arm64-agent:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: gofmt
        run: |
          files="$(git ls-files '*.go')"
          changed="$(gofmt -l $files)"
          if [ -n "$changed" ]; then
            echo "$changed"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: race tests
        run: go test -race ./cmd/oaw-agent ./internal/agent/supervisor ./internal/collector/network
      - name: macOS package script syntax
        run: |
          python3 -m py_compile scripts/release/stage_agent_macos_install.py scripts/release/validate_agent_macos_install.py
          bash -n scripts/release/build_agent_macos_pkg.sh scripts/release/sign_notarize_agent_macos.sh scripts/release/uninstall_agent_macos.sh packaging/agent/macos/scripts/preinstall packaging/agent/macos/scripts/postinstall
      - name: Build arm64 PKG
        run: bash scripts/release/build_agent_macos_pkg.sh --version 0.1.100 --arch-mode arm64
      - name: Build arm64 upgrade fixture PKG
        run: bash scripts/release/build_agent_macos_pkg.sh --version 0.1.99 --arch-mode arm64
      - name: LaunchDaemon lifecycle smoke test
        run: |
          set -euo pipefail
          PKG="dist/agent/0.1.100/packages/OpenAssetWatchAgent-0.1.100-macos-arm64.pkg"
          OLD_PKG="dist/agent/0.1.99/packages/OpenAssetWatchAgent-0.1.99-macos-arm64.pkg"
          LABEL="com.openassetwatch.agent"
          PACKAGE_ID="com.openassetwatch.agent"
          APP_ROOT="/Library/Application Support/OpenAssetWatch/Agent"
          BINARY="$APP_ROOT/bin/oaw-agent"
          CONFIG="$APP_ROOT/config/config.json"
          IDENTITY="$APP_ROOT/identity/identity.json"
          STATE="$APP_ROOT/state"
          LOG_DIR="/Library/Logs/OpenAssetWatch/Agent"
          PLIST="/Library/LaunchDaemons/com.openassetwatch.agent.plist"
          MOCK="$RUNNER_TEMP/oaw_mock_backend.py"
          MOCK_LOG="$RUNNER_TEMP/oaw_mock_backend.jsonl"
          cleanup() {
            sudo bash scripts/release/uninstall_agent_macos.sh --remove-state --remove-logs --purge --forget-receipt || true
            sudo rm -rf "$APP_ROOT" "$LOG_DIR" "$PLIST" || true
            [ -n "${BACKEND_PID:-}" ] && kill "$BACKEND_PID" 2>/dev/null || true
          }
          check_owner_mode() {
            path="$1"
            want="$2"
            got="$(sudo stat -f "%Su:%Sg %Lp" "$path")"
            if [ "$got" != "$want" ]; then
              echo "$path owner/mode = $got, want $want"
              exit 1
            fi
          }
          trap cleanup EXIT
          sudo installer -pkg "$OLD_PKG" -target /
          sudo launchctl print "system/$LABEL" >/dev/null
          sudo launchctl kickstart -k "system/$LABEL"
          deadline=$((SECONDS + 90))
          while [ "$SECONDS" -lt "$deadline" ]; do
            sudo test -f "$STATE/status.json" && break
            sleep 2
          done
          if ! sudo test -f "$STATE/status.json"; then
            echo "status.json was not written after initial LaunchDaemon startup"
            sudo launchctl print "system/$LABEL" || true
            sudo ls -la "$APP_ROOT" "$STATE" "$LOG_DIR" || true
            exit 1
          fi
          sudo cat "$STATE/status.json" > "$RUNNER_TEMP/oaw-status-initial.json"
          python3 - <<'PY' "$RUNNER_TEMP/oaw-status-initial.json"
          import json, sys
          status=json.load(open(sys.argv[1], encoding="utf-8"))
          assert status["health"] in ("degraded", "healthy"), status
          PY
          sudo mkdir -p "$APP_ROOT/config" "$APP_ROOT/identity"
          printf '%s\n' '{"server_url":"http://127.0.0.1:18080","site_id":"ci-macos"}' | sudo tee "$CONFIG" >/dev/null
          printf '%s\n' '{"site_id":"ci-macos","agent_id":"55555555-5555-4555-8555-555555555555","deployment_id":"66666666-6666-4666-8666-666666666666","tenant_id":"ci","created_at":"2026-01-01T00:00:00Z","updated_at":"2026-01-01T00:00:00Z"}' | sudo tee "$IDENTITY" >/dev/null
          sudo chmod 0640 "$CONFIG" "$IDENTITY"
          sudo chown root:_openassetwatch "$CONFIG" "$IDENTITY"
          sudo installer -pkg "$PKG" -target /
          /usr/sbin/pkgutil --pkg-info "$PACKAGE_ID" | grep "version: 0.1.100"
          check_owner_mode "$BINARY" "root:wheel 755"
          check_owner_mode "$PLIST" "root:wheel 644"
          check_owner_mode "$CONFIG" "root:_openassetwatch 640"
          check_owner_mode "$IDENTITY" "root:_openassetwatch 640"
          check_owner_mode "$STATE" "_openassetwatch:_openassetwatch 750"
          check_owner_mode "$LOG_DIR" "_openassetwatch:_openassetwatch 750"
          cat > "$MOCK" <<'PY'
          import json
          import os
          from http.server import BaseHTTPRequestHandler, HTTPServer
          log = os.environ["OAW_MOCK_LOG"]
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.end_headers()
              def do_POST(self):
                  body = self.rfile.read(int(self.headers.get("content-length", "0")))
                  with open(log, "a", encoding="utf-8") as handle:
                      handle.write(json.dumps({"path": self.path, "body_len": len(body)}) + "\n")
                  self.send_response(202)
                  self.end_headers()
              def log_message(self, fmt, *args):
                  return
          HTTPServer(("127.0.0.1", 18080), Handler).serve_forever()
          PY
          OAW_MOCK_LOG="$MOCK_LOG" python3 "$MOCK" &
          BACKEND_PID=$!
          sudo launchctl kickstart -k "system/$LABEL"
          deadline=$((SECONDS + 90))
          while [ "$SECONDS" -lt "$deadline" ]; do
            if sudo test -f "$STATE/last-inventory.json" && [ -f "$MOCK_LOG" ] && grep -q "/api/v1/agents/check-in" "$MOCK_LOG" && grep -q "/api/v1/collections/local-inventory" "$MOCK_LOG"; then
              break
            fi
            sleep 2
          done
          sudo test -f "$STATE/last-inventory.json"
          grep -q "/api/v1/agents/check-in" "$MOCK_LOG"
          grep -q "/api/v1/collections/local-inventory" "$MOCK_LOG"
          sudo cat "$STATE/status.json" > "$RUNNER_TEMP/oaw-status-healthy.json"
          python3 - <<'PY' "$RUNNER_TEMP/oaw-status-healthy.json"
          import json, sys
          status=json.load(open(sys.argv[1], encoding="utf-8"))
          assert status["health"] == "healthy", status
          PY
          ps -axo user,command | grep '[o]aw-agent service run' | grep '^_openassetwatch'
          sudo installer -pkg "$PKG" -target /
          sudo grep -q "ci-macos" "$CONFIG"
          sudo grep -q "55555555-5555-4555-8555-555555555555" "$IDENTITY"
          if sudo installer -pkg "$OLD_PKG" -target /; then
            echo "Downgrade unexpectedly succeeded"
            exit 1
          fi
          sudo grep -q "ci-macos" "$CONFIG"
          sudo grep -q "55555555-5555-4555-8555-555555555555" "$IDENTITY"
          sudo launchctl bootout system "/Library/LaunchDaemons/com.openassetwatch.agent.plist"
          sudo launchctl bootstrap system "/Library/LaunchDaemons/com.openassetwatch.agent.plist"
          sudo launchctl print "system/$LABEL" >/dev/null
          sudo bash scripts/release/uninstall_agent_macos.sh --remove-state --remove-logs --forget-receipt
          if sudo launchctl print "system/$LABEL" >/dev/null 2>&1; then
            echo "LaunchDaemon label still loaded"
            exit 1
          fi
          sudo test -f "$CONFIG"
          sudo test -f "$IDENTITY"

