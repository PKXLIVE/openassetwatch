name: Agent CI

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - ".github/workflows/agent-ci.yml"
      - "cmd/oaw-agent/**"
      - "internal/agent/**"
      - "pkg/**"
      - "scripts/release/**"
      - "packaging/agent/**"
      - "go.mod"
      - "go.sum"

jobs:
  ubuntu-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          files="$(git ls-files '*.go')"
          changed="$(gofmt -l $files)"
          if [ -n "$changed" ]; then
            echo "$changed"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: race tests
        run: go test -race ./cmd/oaw-agent ./internal/agent/supervisor
      - name: Windows cross-build
        shell: pwsh
        run: ./scripts/release/build_agent_dist.ps1 -Version 0.1.0-ci -TargetOS windows -TargetArch amd64
      - name: Release script syntax
        shell: pwsh
        run: |
          $scripts = @(
            "scripts/release/build_agent_dist.ps1",
            "scripts/release/build_agent_msi.ps1",
            "scripts/release/install_agent_windows_files.ps1",
            "scripts/release/uninstall_agent_windows_files.ps1",
            "scripts/release/install_agent_windows_service.ps1",
            "scripts/release/uninstall_agent_windows_service.ps1",
            "scripts/release/sign_agent_windows.ps1"
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            $resolved = (Resolve-Path $script).Path
            $null = [System.Management.Automation.Language.Parser]::ParseFile($resolved, [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) {
              Write-Error "PowerShell parser errors in $script"
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }
          python3 -m py_compile scripts/release/stage_agent_windows_install.py scripts/release/validate_agent_windows_install.py scripts/release/validate_agent_windows_msi.py
          python3 -m py_compile scripts/release/stage_agent_macos_install.py scripts/release/validate_agent_macos_install.py
          $bashScripts = @(
            "scripts/release/build_agent_macos_pkg.sh",
            "scripts/release/sign_notarize_agent_macos.sh",
            "scripts/release/uninstall_agent_macos.sh",
            "packaging/agent/macos/scripts/preinstall",
            "packaging/agent/macos/scripts/postinstall"
          )
          bash -n @bashScripts

  windows-agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: gofmt
        shell: pwsh
        run: |
          $files = git ls-files '*.go'
          foreach ($file in $files) {
            $content = [System.IO.File]::ReadAllText($file)
            $normalized = $content -replace "`r`n", "`n"
            if ($normalized -ne $content) {
              [System.IO.File]::WriteAllText($file, $normalized, [System.Text.UTF8Encoding]::new($false))
            }
          }
          $changed = gofmt -l $files
          if ($changed) {
            $changed
            exit 1
          }
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...

      - name: Build Windows artifact
        shell: pwsh
        run: ./scripts/release/build_agent_dist.ps1 -Version 0.1.0-ci -TargetOS windows -TargetArch amd64

      - name: Stage and validate Windows layout
        shell: pwsh
        run: |
          python ./scripts/release/stage_agent_windows_install.py --version 0.1.0-ci
          python ./scripts/release/validate_agent_windows_install.py --version 0.1.0-ci

      - name: Dry-run Windows helpers
        shell: pwsh
        run: |
          $root = "dist/agent/0.1.0-ci/windows-install"
          $metadata = "$root/service/oaw-agent-service.json"
          ./scripts/release/install_agent_windows_files.ps1 -WindowsInstallRoot $root -DryRun
          ./scripts/release/uninstall_agent_windows_files.ps1 -ServiceMetadata $metadata -DryRun
          ./scripts/release/install_agent_windows_service.ps1 -InstallRoot $root -ServiceMetadata $metadata -DryRun
          ./scripts/release/uninstall_agent_windows_service.ps1 -ServiceMetadata $metadata -DryRun

      - name: Build and validate MSI
        shell: pwsh
        run: |
          ./scripts/release/build_agent_msi.ps1 -Version 0.1.0-ci -TargetArch amd64
          python ./scripts/release/validate_agent_windows_msi.py --version 0.1.0-ci

      - name: Real SCM lifecycle smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $serviceName = "OpenAssetWatchAgent"
          $root = Resolve-Path "dist/agent/0.1.0-ci/windows-install"
          $metadata = Join-Path $root "service/oaw-agent-service.json"
          $mock = Join-Path $env:RUNNER_TEMP "oaw_mock_backend.py"
          @'
          import json
          from http.server import BaseHTTPRequestHandler, HTTPServer
          from pathlib import Path
          log = Path(__import__("os").environ["OAW_MOCK_LOG"])
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.end_headers()
              def do_POST(self):
                  body = self.rfile.read(int(self.headers.get("content-length", "0")))
                  with log.open("a", encoding="utf-8") as f:
                      f.write(json.dumps({"path": self.path, "body_len": len(body)}) + "\n")
                  self.send_response(202)
                  self.end_headers()
              def log_message(self, fmt, *args):
                  return
          HTTPServer(("127.0.0.1", 18080), Handler).serve_forever()
          '@ | Set-Content -Encoding utf8 $mock
          $env:OAW_MOCK_LOG = Join-Path $env:RUNNER_TEMP "oaw_mock_backend.jsonl"
          $backend = Start-Process python -ArgumentList $mock -PassThru
          try {
            ./scripts/release/install_agent_windows_files.ps1 -WindowsInstallRoot $root
            New-Item -ItemType Directory -Force -Path "C:\ProgramData\OpenAssetWatch\Agent\config","C:\ProgramData\OpenAssetWatch\Agent\identity" | Out-Null
            '{"server_url":"http://127.0.0.1:18080","site_id":"ci-site"}' | Set-Content -Encoding utf8 "C:\ProgramData\OpenAssetWatch\Agent\config\config.json"
            '{"site_id":"ci-site","agent_id":"11111111-1111-4111-8111-111111111111","deployment_id":"22222222-2222-4222-8222-222222222222","tenant_id":"ci","created_at":"2026-01-01T00:00:00Z","updated_at":"2026-01-01T00:00:00Z"}' | Set-Content -Encoding utf8 "C:\ProgramData\OpenAssetWatch\Agent\identity\identity.json"
            ./scripts/release/install_agent_windows_service.ps1 -InstallRoot $root -ServiceMetadata $metadata -Start
            $deadline = (Get-Date).AddSeconds(75)
            do {
              Start-Sleep -Seconds 2
              $svc = Get-Service -Name $serviceName -ErrorAction Stop
              $statusPath = "C:\ProgramData\OpenAssetWatch\Agent\state\status.json"
              $inventoryPath = "C:\ProgramData\OpenAssetWatch\Agent\state\last-inventory.json"
              $statusOk = Test-Path $statusPath
              $inventoryOk = Test-Path $inventoryPath
              $events = if (Test-Path $env:OAW_MOCK_LOG) { Get-Content $env:OAW_MOCK_LOG } else { @() }
              if ($svc.Status -eq "Running" -and $statusOk -and $inventoryOk -and ($events -match "/api/v1/agents/check-in") -and ($events -match "/api/v1/collections/local-inventory")) {
                break
              }
            } while ((Get-Date) -lt $deadline)
            if ($svc.Status -ne "Running") { throw "Service did not report Running." }
            if (-not (Test-Path $statusPath)) { throw "status.json was not written." }
            if (-not (Test-Path $inventoryPath)) { throw "last-inventory.json was not written." }
            $status = Get-Content -Raw $statusPath | ConvertFrom-Json
            if ($status.health -ne "healthy") { throw "status.json did not report healthy: $($status | ConvertTo-Json -Compress)" }
            Stop-Service -Name $serviceName -ErrorAction Stop
            (Get-Service -Name $serviceName -ErrorAction Stop).WaitForStatus("Stopped", "00:00:30")
            Start-Service -Name $serviceName -ErrorAction Stop
            (Get-Service -Name $serviceName -ErrorAction Stop).WaitForStatus("Running", "00:00:30")
          }
          finally {
            ./scripts/release/uninstall_agent_windows_service.ps1 -ServiceName $serviceName -Stop -DryRun:$false -ErrorAction SilentlyContinue | Out-Host
            ./scripts/release/uninstall_agent_windows_files.ps1 -ProgramFilesAgentRoot "C:\Program Files\OpenAssetWatch\Agent" -ProgramDataAgentRoot "C:\ProgramData\OpenAssetWatch\Agent" -RemoveState -RemoveLogs -ErrorAction SilentlyContinue | Out-Host
            Remove-Item -LiteralPath "C:\Program Files\OpenAssetWatch\Agent" -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath "C:\ProgramData\OpenAssetWatch\Agent" -Recurse -Force -ErrorAction SilentlyContinue
            Stop-Process -Id $backend.Id -Force -ErrorAction SilentlyContinue
          }
          if (Get-Service -Name $serviceName -ErrorAction SilentlyContinue) {
            throw "Service was not removed."
          }

      - name: MSI lifecycle smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $msi = Resolve-Path "dist/agent/0.1.0-ci/packages/OpenAssetWatchAgent-0.1.0-ci-windows-amd64.msi"
          ./scripts/release/build_agent_dist.ps1 -Version 0.1.1-ci -TargetOS windows -TargetArch amd64
          ./scripts/release/build_agent_msi.ps1 -Version 0.1.1-ci -TargetArch amd64
          $msiUpgrade = Resolve-Path "dist/agent/0.1.1-ci/packages/OpenAssetWatchAgent-0.1.1-ci-windows-amd64.msi"
          $log = Join-Path $env:RUNNER_TEMP "oaw-msi-install.log"
          $configPath = "C:\ProgramData\OpenAssetWatch\Agent\config\config.json"
          $identityPath = "C:\ProgramData\OpenAssetWatch\Agent\identity\identity.json"
          try {
            New-Item -ItemType Directory -Force -Path "C:\ProgramData\OpenAssetWatch\Agent\config","C:\ProgramData\OpenAssetWatch\Agent\identity" | Out-Null
            '{"server_url":"http://127.0.0.1:18080","site_id":"ci-msi-site"}' | Set-Content -Encoding utf8 $configPath
            '{"site_id":"ci-msi-site","agent_id":"33333333-3333-4333-8333-333333333333","deployment_id":"44444444-4444-4444-8444-444444444444","tenant_id":"ci","created_at":"2026-01-01T00:00:00Z","updated_at":"2026-01-01T00:00:00Z"}' | Set-Content -Encoding utf8 $identityPath
            $proc = Start-Process msiexec.exe -ArgumentList @("/i", $msi, "/qn", "/norestart", "/l*v", $log) -Wait -PassThru
            if ($proc.ExitCode -ne 0) { throw "MSI install failed with $($proc.ExitCode)." }
            if (-not (Get-Service -Name OpenAssetWatchAgent -ErrorAction SilentlyContinue)) { throw "MSI did not create service." }
            $repair = Start-Process msiexec.exe -ArgumentList @("/fa", $msi, "/qn", "/norestart") -Wait -PassThru
            if ($repair.ExitCode -ne 0) { throw "MSI repair failed with $($repair.ExitCode)." }
            if (-not (Select-String -LiteralPath $configPath -Pattern "ci-msi-site" -Quiet)) { throw "MSI repair did not preserve config." }
            if (-not (Select-String -LiteralPath $identityPath -Pattern "33333333-3333-4333-8333-333333333333" -Quiet)) { throw "MSI repair did not preserve identity." }
            $upgrade = Start-Process msiexec.exe -ArgumentList @("/i", $msiUpgrade, "/qn", "/norestart") -Wait -PassThru
            if ($upgrade.ExitCode -ne 0) { throw "MSI major upgrade failed with $($upgrade.ExitCode)." }
            if (-not (Get-Service -Name OpenAssetWatchAgent -ErrorAction SilentlyContinue)) { throw "MSI major upgrade removed service." }
            if (-not (Select-String -LiteralPath $configPath -Pattern "ci-msi-site" -Quiet)) { throw "MSI major upgrade did not preserve config." }
            if (-not (Select-String -LiteralPath $identityPath -Pattern "33333333-3333-4333-8333-333333333333" -Quiet)) { throw "MSI major upgrade did not preserve identity." }
          }
          finally {
            $uninstall = Start-Process msiexec.exe -ArgumentList @("/x", $msiUpgrade, "/qn", "/norestart") -Wait -PassThru
            if ($uninstall.ExitCode -ne 0) { throw "MSI uninstall failed with $($uninstall.ExitCode)." }
          }
          if (Get-Service -Name OpenAssetWatchAgent -ErrorAction SilentlyContinue) {
            throw "MSI uninstall left an orphan service."
          }
          if (-not (Test-Path $configPath)) { throw "MSI uninstall did not preserve config." }
          if (-not (Test-Path $identityPath)) { throw "MSI uninstall did not preserve identity." }

  macos-arm64-agent:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: gofmt
        run: |
          files="$(git ls-files '*.go')"
          changed="$(gofmt -l $files)"
          if [ -n "$changed" ]; then
            echo "$changed"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: race tests
        run: go test -race ./cmd/oaw-agent ./internal/agent/supervisor ./internal/collector/network
      - name: macOS package script syntax
        run: |
          python3 -m py_compile scripts/release/stage_agent_macos_install.py scripts/release/validate_agent_macos_install.py
          bash -n scripts/release/build_agent_macos_pkg.sh scripts/release/sign_notarize_agent_macos.sh scripts/release/uninstall_agent_macos.sh packaging/agent/macos/scripts/preinstall packaging/agent/macos/scripts/postinstall
      - name: Build arm64 PKG
        run: bash scripts/release/build_agent_macos_pkg.sh --version 0.1.100 --arch-mode arm64
      - name: Build arm64 upgrade fixture PKG
        run: bash scripts/release/build_agent_macos_pkg.sh --version 0.1.99 --arch-mode arm64
      - name: LaunchDaemon lifecycle smoke test
        run: |
          set -euo pipefail
          PKG="dist/agent/0.1.100/packages/OpenAssetWatchAgent-0.1.100-macos-arm64.pkg"
          OLD_PKG="dist/agent/0.1.99/packages/OpenAssetWatchAgent-0.1.99-macos-arm64.pkg"
          LABEL="com.openassetwatch.agent"
          PACKAGE_ID="com.openassetwatch.agent"
          APP_ROOT="/Library/Application Support/OpenAssetWatch/Agent"
          BINARY="$APP_ROOT/bin/oaw-agent"
          CONFIG="$APP_ROOT/config/config.json"
          IDENTITY="$APP_ROOT/identity/identity.json"
          STATE="$APP_ROOT/state"
          LOG_DIR="/Library/Logs/OpenAssetWatch/Agent"
          PLIST="/Library/LaunchDaemons/com.openassetwatch.agent.plist"
          MOCK="$RUNNER_TEMP/oaw_mock_backend.py"
          MOCK_LOG="$RUNNER_TEMP/oaw_mock_backend.jsonl"
          cleanup() {
            sudo bash scripts/release/uninstall_agent_macos.sh --remove-state --remove-logs --purge --forget-receipt || true
            sudo rm -rf "$APP_ROOT" "$LOG_DIR" "$PLIST" || true
            [ -n "${BACKEND_PID:-}" ] && kill "$BACKEND_PID" 2>/dev/null || true
          }
          check_owner_mode() {
            path="$1"
            want="$2"
            got="$(sudo stat -f "%Su:%Sg %Lp" "$path")"
            if [ "$got" != "$want" ]; then
              echo "$path owner/mode = $got, want $want"
              exit 1
            fi
          }
          trap cleanup EXIT
          sudo installer -pkg "$OLD_PKG" -target /
          sudo launchctl print "system/$LABEL" >/dev/null
          sudo launchctl kickstart -k "system/$LABEL"
          deadline=$((SECONDS + 90))
          while [ "$SECONDS" -lt "$deadline" ]; do
            sudo test -f "$STATE/status.json" && break
            sleep 2
          done
          if ! sudo test -f "$STATE/status.json"; then
            echo "status.json was not written after initial LaunchDaemon startup"
            sudo launchctl print "system/$LABEL" || true
            sudo ls -la "$APP_ROOT" "$STATE" "$LOG_DIR" || true
            exit 1
          fi
          sudo cat "$STATE/status.json" > "$RUNNER_TEMP/oaw-status-initial.json"
          python3 - <<'PY' "$RUNNER_TEMP/oaw-status-initial.json"
          import json, sys
          status=json.load(open(sys.argv[1], encoding="utf-8"))
          assert status["health"] in ("degraded", "healthy"), status
          PY
          sudo mkdir -p "$APP_ROOT/config" "$APP_ROOT/identity"
          printf '%s\n' '{"server_url":"http://127.0.0.1:18080","site_id":"ci-macos"}' | sudo tee "$CONFIG" >/dev/null
          printf '%s\n' '{"site_id":"ci-macos","agent_id":"55555555-5555-4555-8555-555555555555","deployment_id":"66666666-6666-4666-8666-666666666666","tenant_id":"ci","created_at":"2026-01-01T00:00:00Z","updated_at":"2026-01-01T00:00:00Z"}' | sudo tee "$IDENTITY" >/dev/null
          sudo chmod 0640 "$CONFIG" "$IDENTITY"
          sudo chown root:_openassetwatch "$CONFIG" "$IDENTITY"
          sudo installer -pkg "$PKG" -target /
          /usr/sbin/pkgutil --pkg-info "$PACKAGE_ID" | grep "version: 0.1.100"
          check_owner_mode "$BINARY" "root:wheel 755"
          check_owner_mode "$PLIST" "root:wheel 644"
          check_owner_mode "$CONFIG" "root:_openassetwatch 640"
          check_owner_mode "$IDENTITY" "root:_openassetwatch 640"
          check_owner_mode "$STATE" "_openassetwatch:_openassetwatch 750"
          check_owner_mode "$LOG_DIR" "_openassetwatch:_openassetwatch 750"
          cat > "$MOCK" <<'PY'
          import json
          import os
          from http.server import BaseHTTPRequestHandler, HTTPServer
          log = os.environ["OAW_MOCK_LOG"]
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.end_headers()
              def do_POST(self):
                  body = self.rfile.read(int(self.headers.get("content-length", "0")))
                  with open(log, "a", encoding="utf-8") as handle:
                      handle.write(json.dumps({"path": self.path, "body_len": len(body)}) + "\n")
                  self.send_response(202)
                  self.end_headers()
              def log_message(self, fmt, *args):
                  return
          HTTPServer(("127.0.0.1", 18080), Handler).serve_forever()
          PY
          OAW_MOCK_LOG="$MOCK_LOG" python3 "$MOCK" &
          BACKEND_PID=$!
          sudo launchctl kickstart -k "system/$LABEL"
          deadline=$((SECONDS + 90))
          while [ "$SECONDS" -lt "$deadline" ]; do
            if sudo test -f "$STATE/last-inventory.json" && [ -f "$MOCK_LOG" ] && grep -q "/api/v1/agents/check-in" "$MOCK_LOG" && grep -q "/api/v1/collections/local-inventory" "$MOCK_LOG"; then
              break
            fi
            sleep 2
          done
          sudo test -f "$STATE/last-inventory.json"
          grep -q "/api/v1/agents/check-in" "$MOCK_LOG"
          grep -q "/api/v1/collections/local-inventory" "$MOCK_LOG"
          sudo cat "$STATE/status.json" > "$RUNNER_TEMP/oaw-status-healthy.json"
          python3 - <<'PY' "$RUNNER_TEMP/oaw-status-healthy.json"
          import json, sys
          status=json.load(open(sys.argv[1], encoding="utf-8"))
          assert status["health"] == "healthy", status
          PY
          ps -axo user,command | grep '[o]aw-agent service run' | grep '^_openassetwatch'
          sudo installer -pkg "$PKG" -target /
          sudo grep -q "ci-macos" "$CONFIG"
          sudo grep -q "55555555-5555-4555-8555-555555555555" "$IDENTITY"
          if sudo installer -pkg "$OLD_PKG" -target /; then
            echo "Downgrade unexpectedly succeeded"
            exit 1
          fi
          sudo grep -q "ci-macos" "$CONFIG"
          sudo grep -q "55555555-5555-4555-8555-555555555555" "$IDENTITY"
          sudo launchctl bootout system "/Library/LaunchDaemons/com.openassetwatch.agent.plist"
          sudo launchctl bootstrap system "/Library/LaunchDaemons/com.openassetwatch.agent.plist"
          sudo launchctl print "system/$LABEL" >/dev/null
          sudo bash scripts/release/uninstall_agent_macos.sh --remove-state --remove-logs --forget-receipt
          if sudo launchctl print "system/$LABEL" >/dev/null 2>&1; then
            echo "LaunchDaemon label still loaded"
            exit 1
          fi
          sudo test -f "$CONFIG"
          sudo test -f "$IDENTITY"

  macos-intel-agent:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Go validation
        run: |
          files="$(git ls-files '*.go')"
          changed="$(gofmt -l $files)"
          if [ -n "$changed" ]; then echo "$changed"; exit 1; fi
          go vet ./...
          go test ./...
          go test -race ./cmd/oaw-agent ./internal/agent/supervisor ./internal/collector/network
      - name: Build Intel PKG
        run: bash scripts/release/build_agent_macos_pkg.sh --version 0.1.101 --arch-mode amd64
      - name: Install and uninstall Intel PKG
        run: |
          set -euo pipefail
          PKG="dist/agent/0.1.101/packages/OpenAssetWatchAgent-0.1.101-macos-amd64.pkg"
          cleanup() {
            sudo bash scripts/release/uninstall_agent_macos.sh --remove-state --remove-logs --purge --forget-receipt || true
          }
          trap cleanup EXIT
          sudo installer -pkg "$PKG" -target /
          sudo launchctl print system/com.openassetwatch.agent >/dev/null
          sudo bash scripts/release/uninstall_agent_macos.sh --remove-state --remove-logs --forget-receipt

  macos-universal-package:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build universal unsigned PKG
        run: bash scripts/release/build_agent_macos_pkg.sh --version 0.1.102 --arch-mode universal
      - name: Inspect universal artifact
        run: |
          set -euo pipefail
          BIN="dist/agent/0.1.102/darwin-universal/oaw-agent"
          PKG="dist/agent/0.1.102/packages/OpenAssetWatchAgent-0.1.102-macos-universal.pkg"
          lipo "$BIN" -verify_arch arm64 x86_64
          pkgutil --payload-files "$PKG" | grep "Library/Application Support/OpenAssetWatch/Agent/bin/oaw-agent"
          pkgutil --payload-files "$PKG" | grep "Library/LaunchDaemons/com.openassetwatch.agent.plist"
      - name: Install and uninstall universal PKG
        run: |
          set -euo pipefail
          PKG="dist/agent/0.1.102/packages/OpenAssetWatchAgent-0.1.102-macos-universal.pkg"
          cleanup() {
            sudo bash scripts/release/uninstall_agent_macos.sh --remove-state --remove-logs --purge --forget-receipt || true
          }
          trap cleanup EXIT
          sudo installer -pkg "$PKG" -target /
          /usr/sbin/pkgutil --pkg-info com.openassetwatch.agent | grep "version: 0.1.102"
          sudo launchctl print system/com.openassetwatch.agent >/dev/null
          sudo bash scripts/release/uninstall_agent_macos.sh --remove-state --remove-logs --forget-receipt
      - uses: actions/upload-artifact@v4
        with:
          name: openassetwatch-agent-macos-unsigned
          path: |
            dist/agent/0.1.102/packages/*.pkg
            dist/agent/0.1.102/packages/*.sha256
            dist/agent/0.1.102/packages/*.json
