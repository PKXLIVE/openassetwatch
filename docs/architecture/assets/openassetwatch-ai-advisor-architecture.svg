<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="3000" viewBox="0 0 1800 3000" role="img" aria-labelledby="title desc">
  <title id="title">OpenAssetWatch AI Advisor Architecture</title>
  <desc id="desc">A dark command-center architecture diagram showing Control Tower as the hub, collection spokes, the Shared Evidence Blackboard as the source of truth for AI-readable evidence context, read-only AI Advisor modules, reviewer gates, trust boundaries, and future MCP tool controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0b1828"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#28d8c4"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2fa8ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#65d383"/>
    </marker>
    <marker id="arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#f2b84b"/>
    </marker>
    <style>
      .canvas { fill: url(#bg); }
      .frame { fill: #0b1524; stroke: #203b56; stroke-width: 2; rx: 28; filter: url(#shadow); }
      .title { fill: #f5fbff; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 34px; font-weight: 700; }
      .subtitle { fill: #9fb6c9; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 18px; }
      .label { fill: #f5fbff; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 21px; font-weight: 700; }
      .body { fill: #afc4d8; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 15px; }
      .tiny { fill: #b9c9d8; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 13px; }
      .card { fill: #0d2a44; stroke: #2fa8ff; stroke-width: 2; rx: 16; }
      .card-teal { fill: #0b352e; stroke: #28d8c4; stroke-width: 2; rx: 16; }
      .card-amber { fill: #3c2e13; stroke: #f2b84b; stroke-width: 2; rx: 16; }
      .card-green { fill: #103d35; stroke: #65d383; stroke-width: 2; rx: 16; }
      .card-red { fill: #3a1f1c; stroke: #f06464; stroke-width: 2; rx: 16; }
      .card-purple { fill: #183253; stroke: #28d8c4; stroke-width: 2; rx: 16; }
      .flow-teal { stroke: #28d8c4; stroke-width: 4; fill: none; marker-end: url(#arrowTeal); }
      .flow-blue { stroke: #2fa8ff; stroke-width: 4; fill: none; marker-end: url(#arrowBlue); }
      .flow-green { stroke: #65d383; stroke-width: 4; fill: none; marker-end: url(#arrowGreen); }
      .flow-amber { stroke: #f2b84b; stroke-width: 4; fill: none; marker-end: url(#arrowAmber); }
      .flow-red { stroke: #f06464; stroke-width: 5; fill: none; stroke-dasharray: 12 10; }
      .pill { fill: #103d35; stroke: #65d383; stroke-width: 1.5; rx: 18; }
      .pill-red { fill: #4a1c22; stroke: #f06464; stroke-width: 1.5; rx: 18; }
      .pill-text { fill: #dfffee; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .blocked { fill: #ffd1d1; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 700; }
    </style>
  </defs>

  <rect class="canvas" width="1800" height="3000"/>
  <text x="70" y="72" class="title">OpenAssetWatch AI Advisor Architecture</text>
  <text x="70" y="110" class="subtitle">Hierarchical Hub-and-Spoke + Shared Evidence Blackboard, with advisory-first AI, reviewer gates, and controlled future MCP tools.</text>

  <!-- Frame 1 -->
  <g transform="translate(60 155)">
    <rect class="frame" width="1680" height="500"/>
    <text x="42" y="58" class="title">1. Architecture Overview</text>
    <text x="42" y="92" class="subtitle">Control Tower is the hub. Collection, integration, tool, and AI capabilities are spokes. The Shared Evidence Blackboard is the AI evidence source of truth.</text>
    <rect x="660" y="145" width="360" height="105" class="card"/>
    <text x="705" y="184" class="label">Control Tower</text>
    <text x="705" y="214" class="body">Hub / coordinator</text>
    <text x="705" y="238" class="body">API, policy, normalization, approvals</text>
    <rect x="585" y="315" width="510" height="112" class="card-teal"/>
    <text x="635" y="356" class="label">Shared Evidence Blackboard</text>
    <text x="635" y="386" class="body">Raw submissions, normalized assets, evidence records</text>
    <text x="635" y="410" class="body">findings, scores, timelines, and source references</text>
    <rect x="75" y="135" width="260" height="82" class="card"/>
    <text x="105" y="170" class="label">Collectors</text>
    <text x="105" y="198" class="body">Windows / macOS / Linux</text>
    <rect x="75" y="255" width="260" height="82" class="card"/>
    <text x="105" y="290" class="label">Passive Sensors</text>
    <text x="105" y="318" class="body">SPAN / mirror port</text>
    <rect x="75" y="375" width="260" height="82" class="card-teal"/>
    <text x="105" y="410" class="label">open_detector</text>
    <text x="105" y="438" class="body">Security-tool detection</text>
    <rect x="1345" y="135" width="260" height="82" class="card"/>
    <text x="1375" y="170" class="label">Integrations</text>
    <text x="1375" y="198" class="body">SIEM / vuln / EDR / MDM</text>
    <rect x="1345" y="255" width="260" height="82" class="card-amber"/>
    <text x="1375" y="290" class="label">MCP Tools</text>
    <text x="1375" y="318" class="body">Approved read-only tools</text>
    <rect x="1345" y="375" width="260" height="82" class="card-purple"/>
    <text x="1375" y="410" class="label">AI Modules</text>
    <text x="1375" y="438" class="body">Advisors, reports, review</text>
    <path class="flow-teal" d="M335 176 L660 198"/>
    <path class="flow-teal" d="M335 296 L660 198"/>
    <path class="flow-teal" d="M335 416 L585 371"/>
    <path class="flow-blue" d="M1345 176 L1020 198"/>
    <path class="flow-amber" d="M1345 296 L1020 198"/>
    <path class="flow-blue" d="M1345 416 L1095 371"/>
    <path class="flow-green" d="M840 250 L840 315"/>
    <rect x="710" y="452" width="260" height="34" class="pill"/>
    <text x="746" y="474" class="pill-text">AI reads evidence, not guesses</text>
  </g>

  <!-- Frame 2 -->
  <g transform="translate(60 700)">
    <rect class="frame" width="1680" height="500"/>
    <text x="42" y="58" class="title">2. Collection-to-AI Data Flow</text>
    <text x="42" y="92" class="subtitle">Submissions become normalized evidence, deterministic findings, reviewed advisor output, and operator reports.</text>
    <g transform="translate(55 150)">
      <rect width="220" height="92" class="card"/><text x="24" y="36" class="label">01 Inputs</text><text x="24" y="62" class="body">Collectors + sensors</text><text x="24" y="82" class="body">Integrations</text>
      <rect x="300" width="220" height="92" class="card"/><text x="324" y="36" class="label">02 API</text><text x="324" y="66" class="body">Control Tower hub</text>
      <rect x="600" width="220" height="92" class="card"/><text x="624" y="36" class="label">03 Normalizer</text><text x="624" y="66" class="body">Standardize evidence</text>
      <rect x="900" width="245" height="92" class="card-teal"/><text x="924" y="36" class="label">04 Evidence</text><text x="924" y="66" class="body">Raw + assets + records</text>
      <rect x="1230" width="245" height="92" class="card"/><text x="1254" y="36" class="label">05 Risk Engine</text><text x="1254" y="66" class="body">Rules, findings, scores</text>
      <path class="flow-teal" d="M220 46 L300 46"/><path class="flow-teal" d="M520 46 L600 46"/><path class="flow-teal" d="M820 46 L900 46"/><path class="flow-teal" d="M1145 46 L1230 46"/>
    </g>
    <g transform="translate(205 315)">
      <rect width="245" height="92" class="card-teal"/><text x="24" y="36" class="label">06 Timeline</text><text x="24" y="66" class="body">Findings / scores / asset history</text>
      <rect x="330" width="245" height="92" class="card-purple"/><text x="354" y="36" class="label">07 AI Advisor</text><text x="354" y="66" class="body">Read-only explanation</text>
      <rect x="660" width="245" height="92" class="card-amber"/><text x="684" y="36" class="label">08 Reviewer</text><text x="684" y="66" class="body">Evidence and safety checks</text>
      <rect x="990" width="245" height="92" class="card-green"/><text x="1014" y="36" class="label">09 Dashboard</text><text x="1014" y="66" class="body">Reports and operator view</text>
      <path class="flow-green" d="M245 46 L330 46"/><path class="flow-amber" d="M575 46 L660 46"/><path class="flow-green" d="M905 46 L990 46"/>
    </g>
    <path class="flow-blue" d="M1410 242 C1410 290 330 290 330 315"/>
  </g>

  <!-- Frame 3 -->
  <g transform="translate(60 1245)">
    <rect class="frame" width="1680" height="500"/>
    <text x="42" y="58" class="title">3. AI Advisor Modules</text>
    <text x="42" y="92" class="subtitle">A router delegates to focused modules. A Reviewer / Evaluator gate checks every user-facing result.</text>
    <rect x="630" y="130" width="420" height="86" class="card"/>
    <text x="685" y="165" class="label">AI Router / Coordinator</text>
    <text x="685" y="195" class="body">Chooses the narrowest tenant-scoped module</text>
    <rect x="105" y="285" width="285" height="82" class="card-purple"/><text x="130" y="320" class="label">Inventory Advisor</text><text x="130" y="348" class="body">Unmanaged, unknown, stale assets</text>
    <rect x="430" y="285" width="285" height="82" class="card-purple"/><text x="455" y="320" class="label">Risk Explanation</text><text x="455" y="348" class="body">Findings, severity, priority</text>
    <rect x="755" y="285" width="285" height="82" class="card-purple"/><text x="780" y="320" class="label">Coverage Advisor</text><text x="780" y="348" class="body">EDR, MDM, logging gaps</text>
    <rect x="1080" y="285" width="285" height="82" class="card-purple"/><text x="1105" y="320" class="label">IoT / OT Advisor</text><text x="1105" y="348" class="body">Embedded and OT-like devices</text>
    <rect x="255" y="385" width="285" height="82" class="card-purple"/><text x="280" y="420" class="label">Splunk + Detection</text><text x="280" y="448" class="body">Searches and detection logic</text>
    <rect x="580" y="385" width="285" height="82" class="card-green"/><text x="605" y="420" class="label">Report Writer</text><text x="605" y="448" class="body">Executive and technical reports</text>
    <rect x="905" y="385" width="285" height="82" class="card-amber"/><text x="930" y="420" class="label">Reviewer / Evaluator</text><text x="930" y="448" class="body">Evidence, safety, privacy gate</text>
    <path class="flow-teal" d="M840 216 L248 285"/><path class="flow-teal" d="M840 216 L572 285"/><path class="flow-teal" d="M840 216 L897 285"/><path class="flow-teal" d="M840 216 L1222 285"/>
    <path class="flow-teal" d="M840 216 L397 385"/><path class="flow-green" d="M840 216 L722 385"/><path class="flow-amber" d="M840 216 L1047 385"/>
  </g>

  <!-- Frame 4 -->
  <g transform="translate(60 1790)">
    <rect class="frame" width="1680" height="500"/>
    <text x="42" y="58" class="title">4. Trust and Safety Boundaries</text>
    <text x="42" y="92" class="subtitle">Collected text and tool output are untrusted evidence. AI is read-only and advisory by default.</text>
    <rect x="85" y="150" width="330" height="200" class="card-red"/>
    <text x="120" y="190" class="label">Untrusted inputs</text>
    <text x="120" y="222" class="body">Collector data, hostnames</text>
    <text x="120" y="246" class="body">software names, banners</text>
    <text x="120" y="270" class="body">network observations, notes</text>
    <text x="120" y="294" class="body">integration and tool output</text>
    <rect x="535" y="160" width="330" height="160" class="card"/>
    <text x="575" y="200" class="label">Control Tower boundary</text>
    <text x="575" y="232" class="body">Normalize, redact, scope by tenant</text>
    <text x="575" y="256" class="body">validate source references</text>
    <rect x="990" y="160" width="330" height="160" class="card-green"/>
    <text x="1030" y="200" class="label">Trusted policy context</text>
    <text x="1030" y="232" class="body">Authorization, allowlists</text>
    <text x="1030" y="256" class="body">approval rules, tenant scope</text>
    <path class="flow-amber" d="M415 250 L535 240"/><path class="flow-green" d="M990 240 L865 240"/>
    <rect x="535" y="365" width="330" height="86" class="card-purple"/>
    <text x="575" y="400" class="label">AI Advisor</text>
    <text x="575" y="428" class="body">Read-only explanations and recommendations</text>
    <path class="flow-teal" d="M700 320 L700 365"/>
    <rect x="1010" y="354" width="260" height="34" class="pill-red"/><text x="1045" y="377" class="blocked">Blocked: run scans</text>
    <rect x="1010" y="396" width="260" height="34" class="pill-red"/><text x="1045" y="419" class="blocked">Blocked: execute commands</text>
    <rect x="1010" y="438" width="260" height="34" class="pill-red"/><text x="1045" y="461" class="blocked">Blocked: change policies</text>
    <rect x="1290" y="354" width="260" height="34" class="pill-red"/><text x="1325" y="377" class="blocked">Blocked: isolate devices</text>
    <rect x="1290" y="396" width="260" height="34" class="pill-red"/><text x="1325" y="419" class="blocked">Blocked: collect secrets</text>
    <path class="flow-red" d="M930 340 L930 470"/>
  </g>

  <!-- Frame 5 -->
  <g transform="translate(60 2335)">
    <rect class="frame" width="1680" height="500"/>
    <text x="42" y="58" class="title">5. MCP Future Model</text>
    <text x="42" y="92" class="subtitle">MCP tools are controlled read-only spokes at first. They access approved APIs and evidence only through Control Tower.</text>
    <rect x="90" y="205" width="280" height="110" class="card-purple"/>
    <text x="130" y="246" class="label">AI Advisor</text>
    <text x="130" y="272" class="body">Requests evidence review</text>
    <text x="130" y="296" class="body">or enrichment</text>
    <rect x="520" y="180" width="360" height="160" class="card-amber"/>
    <text x="560" y="222" class="label">AI Tool Gateway</text>
    <text x="560" y="254" class="body">Allowlists, schemas, validation</text>
    <text x="560" y="278" class="body">tenant scope, audit, approval checks</text>
    <rect x="1045" y="180" width="360" height="160" class="card"/>
    <text x="1085" y="222" class="label">Control Tower</text>
    <text x="1085" y="254" class="body">Approved APIs, policy, evidence</text>
    <text x="1085" y="278" class="body">audit and approval layer</text>
    <rect x="520" y="385" width="360" height="86" class="card-green"/>
    <text x="560" y="420" class="label">Approved MCP Tools</text>
    <text x="560" y="448" class="body">Read-only evidence, reporting, detection support</text>
    <path class="flow-amber" d="M370 260 L520 260"/>
    <path class="flow-green" d="M880 260 L1045 260"/>
    <path class="flow-green" d="M700 340 L700 385"/>
    <rect x="90" y="390" width="280" height="70" class="card-red"/>
    <text x="125" y="432" class="label">No direct collector control</text>
    <rect x="1045" y="390" width="360" height="70" class="card-red"/>
    <text x="1085" y="432" class="label">No direct sensor control</text>
    <path class="flow-red" d="M370 425 L520 425"/>
    <path class="flow-red" d="M880 425 L1045 425"/>
  </g>
</svg>
