  service_name: openassetwatch-agent
  service_definition_path: /etc/systemd/system/openassetwatch-agent.service
  package_metadata_path:
    - /var/lib/rpm/
    - /usr/lib/sysimage/rpm/
validation:
  checksum: required
  signature: required_ci_secret_reference_only
  sbom: planned
  provenance: planned
safety:
  executable_installer_commands: none
  service_manager_commands: none
  package_manager_commands: none
  secrets: none
  notes:
    - Template only. This repository file does not build or install an RPM.
    - Package-manager actions require explicit administrator control.
