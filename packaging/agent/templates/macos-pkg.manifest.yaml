package:
  name: openassetwatch-agent
  target_os: darwin
  package_type: pkg
  status: local_unsigned_pkg_build_supported
  install_model: launchdaemon_pkg
  binary_path: /Library/Application Support/OpenAssetWatch/Agent/bin/oaw-agent
  config_path: /Library/Application Support/OpenAssetWatch/Agent/config/config.json
  identity_path: /Library/Application Support/OpenAssetWatch/Agent/identity/identity.json
  state_directory: /Library/Application Support/OpenAssetWatch/Agent/state
  log_directory: /Library/Logs/OpenAssetWatch/Agent/
  status_file_path: /Library/Application Support/OpenAssetWatch/Agent/state/status.json
  service_name: com.openassetwatch.agent
  service_definition_path: /Library/LaunchDaemons/com.openassetwatch.agent.plist
  service_user: _openassetwatch
  service_group: _openassetwatch
  package_metadata_path: /var/db/receipts/com.openassetwatch.agent.*
  package_version_policy: numeric_one_to_three_components_no_prerelease_suffix
  tested_macos_versions:
    - macos-15-arm64-ci
    - macos-15-intel-ci
validation:
  checksum: required
  signature: required_for_release
  notarization: required_for_release
  embedded_binary_signature: required_for_signed_release
  sbom: planned
  provenance: planned
safety:
  executable_installer_commands: pkgbuild_productbuild_only
  service_manager_commands: launchctl_in_pkg_scripts_only
  package_manager_commands: none
  secrets: none
  notes:
    - Local unsigned PKG artifacts are validation artifacts only.
    - Signed but not notarized PKG artifacts are signing-validation artifacts only.
    - Release signing signs the final embedded binary before pkgroot staging.
    - LaunchDaemon uses oaw-agent service run and the portable supervisor.
    - LaunchDaemon uses KeepAlive=true, ThrottleInterval=60, and umask "027".
    - No StartInterval or StartCalendarInterval scheduling is packaged.
    - Signing and notarization credentials must remain outside the repository.
