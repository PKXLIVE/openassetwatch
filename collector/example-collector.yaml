collector:
  id: local-dev-collector-01
  name: Local Dev Collector
  mode: hybrid

identity:
  path: ./identity.json

backend:
  url: http://localhost:8000
  token: change-me-dev-token

checkin:
  enabled: true

inventory:
  upload_enabled: false

scheduler:
  enabled: false
  heartbeat_interval_seconds: 3600
  inventory_interval_seconds: 86400

deployment:
  deployment_id: home-lab-cincinnati
  business_unit: lab
  site: home
  environment: test
  install_ring: pilot

labels:
  owner: dion
  device_group: mac-test
  install_profile: local-collector
