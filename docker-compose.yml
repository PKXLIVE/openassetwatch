services:
  postgres:
    image: postgres:16
    container_name: openassetwatch-postgres
    environment:
      POSTGRES_DB: openassetwatch
      POSTGRES_USER: openassetwatch
      POSTGRES_PASSWORD: ${OAW_POSTGRES_PASSWORD:-openassetwatch_local_only_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openassetwatch -d openassetwatch"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ./backend
    image: openassetwatch-control-tower-backend:local
    container_name: openassetwatch-backend
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+psycopg2://openassetwatch:${OAW_POSTGRES_PASSWORD:-openassetwatch_local_only_change_me}@postgres:5432/openassetwatch
      OPENASSETWATCH_COLLECTOR_TOKEN: ${OPENASSETWATCH_COLLECTOR_TOKEN:-}
      OPENASSETWATCH_CONTROL_TOWER_VERSION: ${OPENASSETWATCH_CONTROL_TOWER_VERSION:-0.1.0}
      OPENASSETWATCH_EXPECTED_AGENT_VERSION: ${OPENASSETWATCH_EXPECTED_AGENT_VERSION:-0.1.0}
      OPENASSETWATCH_AGENT_RELEASE_CHANNEL: ${OPENASSETWATCH_AGENT_RELEASE_CHANNEL:-local}
      OPENASSETWATCH_CORS_ORIGINS: ${OPENASSETWATCH_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:8000,http://127.0.0.1:8000}
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 20s

  web:
    image: nginx:1.27-alpine
    container_name: openassetwatch-web
    volumes:
      - ./backend/app/static:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  demo-seed:
    profiles: ["demo"]
    build:
      context: ./backend
    image: openassetwatch-control-tower-backend:local
    working_dir: /workspace
    environment:
      DATABASE_URL: postgresql+psycopg2://openassetwatch:${OAW_POSTGRES_PASSWORD:-openassetwatch_local_only_change_me}@postgres:5432/openassetwatch
      OPENASSETWATCH_DEMO_SEED_ALLOW_COMPOSE_HOST: "1"
    volumes:
      - .:/workspace:ro
    command: ["python", "scripts/seed_control_tower_demo.py", "--allow-compose-database-host"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
