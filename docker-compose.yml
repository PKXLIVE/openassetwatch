services:
  postgres:
    image: postgres:16
    container_name: openassetwatch-postgres
    environment:
      POSTGRES_DB: openassetwatch
      POSTGRES_USER: openassetwatch
      POSTGRES_PASSWORD: openassetwatch_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: openassetwatch-redis
    ports:
      - "6379:6379"

  backend:
    image: python:3.12-slim
    container_name: openassetwatch-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
